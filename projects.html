<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品一覧 - kssk213</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color:#111827; margin:0; }
    .container { max-width:900px; margin:36px auto; padding:24px; }
    header { text-align:center; margin-bottom:20px; }
    h1 { margin:0; }
    .card { background:#fff; border-radius:16px; padding:20px; box-shadow:0 10px 30px rgba(15,23,42,0.06); }
    .project { padding:12px 0; border-bottom:1px solid #eef2f7; }
    .project:last-child { border-bottom:none; }
    a.button { display:inline-block; padding:10px 16px; background:#4338ca; color:#fff; border-radius:999px; text-decoration:none; }
    .meta { color:#6b7280; font-size:0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>作品一覧</h1>
      <p class="meta">ScratchとUnityの作品をここにまとめます。まだ準備中のものがあります。</p>
      <p><a class="button" href="index.html">ホームへ戻る</a></p>
    </header>

    <div class="card">
      <div id="projects-list">
        <p id="loading">読み込み中...</p>
      </div>
    </div>

    <script>
      async function loadProjects() {
        try {
          const res = await fetch('projects.json', {cache: 'no-store'});
          if (!res.ok) throw new Error('データの取得に失敗しました');
          const projects = await res.json();
          const container = document.getElementById('projects-list');
          container.innerHTML = '';
          if (!projects.length) {
            container.innerHTML = '<p>まだ作品がありません。</p>';
            return;
          }
          for (const p of projects) {
            const item = document.createElement('div');
            item.className = 'project';
            const title = document.createElement('h3');
            title.textContent = `${p.platform}: ${p.title}`;
            const desc = document.createElement('p');
            desc.className = 'meta';
            desc.textContent = p.description;
            item.appendChild(title);
            item.appendChild(desc);

            // 内部詳細ページへのリンク
            const detail = document.createElement('a');
            detail.href = `project.html?id=${encodeURIComponent(p.id)}`;
            detail.className = 'button';
            detail.style.marginRight = '10px';
            detail.textContent = '詳細を見る';
            item.appendChild(detail);

            // 外部リンクがある場合は別途表示
            if (p.link) {
              const ext = document.createElement('a');
              ext.href = p.link;
              ext.target = '_blank';
              ext.rel = 'noopener noreferrer';
              ext.style.marginLeft = '6px';
              ext.textContent = '外部で見る';
              item.appendChild(ext);
            }

            container.appendChild(item);
          }
        } catch (err) {
          const container = document.getElementById('projects-list');
          container.innerHTML = '<p>作品の読み込み中にエラーが発生しました。</p>';
          console.error(err);
        }
      }
      window.addEventListener('DOMContentLoaded', loadProjects);
    </script>
  </div>
</body>
</html>
