name: Update projects from Scratch

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Scratch username to fetch (defaults to kssk213)'
        required: false
        type: string
        default: 'kssk213'

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Fetch Scratch projects
        run: |
          python fetch_scratch.py --username "${{ github.event.inputs.username }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git commit -m "Update projects.json from Scratch (${ { github.event.inputs.username } })" || echo "No changes to commit"
          git push
